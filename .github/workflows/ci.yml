name: CI

# LeadFlow had no CI — this gates typecheck + tests on every push/PR so a
# regression in the sending/suppression logic is caught before it ships.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run typecheck
      - run: npm test
